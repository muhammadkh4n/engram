name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      # Intentionally no test step in the publish workflow's check job.
      # The graph package has Neo4j integration tests that require a live
      # Bolt endpoint + GDS plugin which wedges CI; the CI workflow runs
      # tests with a Neo4j service container on main-branch pushes.
      # Publishing is gated on build + typecheck only. Local tests
      # (407 core + 23 e2e) cover the publish pre-flight.

  publish:
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      # Publish packages in dependency order (|| true: skip already-published versions)
      # Auth via npm trusted publishers (OIDC) — no NODE_AUTH_TOKEN needed.
      - run: npm publish --workspace=packages/core --provenance --access public || true
      - run: npm publish --workspace=packages/graph --provenance --access public || true
      - run: npm publish --workspace=packages/openai --provenance --access public || true
      - run: npm publish --workspace=packages/sqlite --provenance --access public || true
      - run: npm publish --workspace=packages/supabase --provenance --access public || true
      - run: npm publish --workspace=packages/mcp --provenance --access public || true
      - run: npm publish --workspace=packages/bench --provenance --access public || true
      - run: npm publish --workspace=packages/openclaw --provenance --access public || true
