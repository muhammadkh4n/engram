name: Publish

on:
  push:
    tags:
      - "v*"
  # Manual re-trigger from any ref (e.g. main) when a tag was already
  # pushed but the publish step failed — see v0.4.0 incident docs.
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      # Intentionally no test step in the publish workflow's check job.
      # The graph package has Neo4j integration tests that require a live
      # Bolt endpoint + GDS plugin which wedges CI; the CI workflow runs
      # tests with a Neo4j service container on main-branch pushes.
      # Publishing is gated on build + typecheck only. Local tests
      # (407 core + 23 e2e) cover the publish pre-flight.

  publish:
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      # Publish every @engram-mem workspace in dependency order.
      #
      # Skip-or-fail policy: if the exact name@version is already on the
      # registry, skip cleanly (idempotent re-runs are safe). Otherwise
      # publish — and any real error (auth, network) FAILS the run.
      #
      # Replaces the previous `npm publish ... || true` chain which
      # swallowed E401/E404 token-permission errors and silently shipped
      # nothing for seven consecutive releases (v0.3.9 through v0.4.0).
      - name: Publish all @engram-mem workspaces
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          WORKSPACES=(core graph openai sqlite rerank-onnx postgrest supabase mcp bench openclaw)
          for w in "${WORKSPACES[@]}"; do
            VER=$(node -p "require('./packages/$w/package.json').version")
            PKG="@engram-mem/$w"
            echo "::group::$PKG@$VER"
            if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
              echo "already published — skipping"
            else
              npm publish --workspace=packages/$w --access public
            fi
            echo "::endgroup::"
          done

      # Create a GitHub Release for the pushed tag with auto-generated notes.
      # Idempotent: re-runs on an existing tag skip instead of failing.
      # Skipped on workflow_dispatch (no tag context to release from).
      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi
