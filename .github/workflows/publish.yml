name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.25-community
        env:
          NEO4J_AUTH: neo4j/engram-dev
          NEO4J_PLUGINS: '["graph-data-science"]'
          NEO4J_dbms_security_procedures_unrestricted: gds.*
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      NEO4J_TEST_URI: bolt://localhost:7687
      NEO4J_TEST_USER: neo4j
      NEO4J_TEST_PASSWORD: engram-dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run test

  publish:
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      # Publish packages in dependency order (|| true: skip already-published versions)
      - run: npm publish --workspace=packages/core --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --workspace=packages/graph --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --workspace=packages/openai --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --workspace=packages/sqlite --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --workspace=packages/supabase --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --workspace=packages/mcp --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --workspace=packages/openclaw --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
