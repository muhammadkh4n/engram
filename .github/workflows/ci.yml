name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      # Tests are skipped in CI until the graph package's integration
      # tests learn to skipIf(!process.env.NEO4J_TEST_READY). Running
      # them without that guard hangs the runner waiting for a Bolt
      # connection the test helpers don't retry-guard.
