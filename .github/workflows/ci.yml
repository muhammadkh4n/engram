name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      # NEO4J_TEST_READY is intentionally unset: graph integration tests
      # are skipped via describe.skipIf(!process.env.NEO4J_TEST_READY).
      - run: npm test
